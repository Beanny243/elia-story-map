<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Resume - Teal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .resume { width: 8.5in; min-height: 11in; margin: 0 auto; background: white; padding: 0.9in; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { margin-bottom: 40px; }
        .name { font-size: 28px; font-weight: 400; color: #008080; letter-spacing: 1px; margin-bottom: 8px; }
        .contact { font-size: 10px; color: #008080; font-weight: 300; }
        .contact span { margin-right: 15px; }
        .section { margin-bottom: 28px; }
        .section-title { font-size: 10px; font-weight: 600; color: #008080; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
        .section-content { font-size: 10px; line-height: 1.6; color: #333; }
        .job { margin-bottom: 18px; }
        .job:last-child { margin-bottom: 0; }
        .job-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .job-title { font-weight: 600; color: #008080; }
        .job-date { color: #888; font-weight: 300; }
        .job-company { color: #555; margin-bottom: 6px; }
        .job-duties { list-style: none; }
        .job-duties li { margin-bottom: 3px; padding-left: 12px; position: relative; color: #444; }
        .job-duties li::before { content: "—"; position: absolute; left: 0; color: #008080; }
        .edu-item { margin-bottom: 10px; }
        .edu-header { display: flex; justify-content: space-between; }
        .edu-degree { font-weight: 600; color: #008080; }
        .edu-date { color: #888; }
        .edu-school { color: #555; }
        .skills-list { display: flex; flex-wrap: wrap; }
        .skill-item { margin-right: 20px; margin-bottom: 5px; color: #444; }
        @media print { body { background: white; padding: 0; } .resume { box-shadow: none; width: 100%; padding: 0.8in; } }
    </style>
</head>
<body>
    <div class="resume">
        <div class="header">
            <h1 class="name">EMMA THOMPSON</h1>
            <div class="contact">
                <span>emma.thompson@email.com</span>
                <span>(555) 345-6789</span>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">Experience</h2>
            <div class="job">
                <div class="job-header">
                    <span class="job-title">Senior Product Manager</span>
                    <span class="job-date">2020 – Present</span>
                </div>
                <div class="job-company">TechFlow Inc.</div>
                <ul class="job-duties">
                    <li>Lead product strategy</li>
                </ul>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">Education</h2>
            <div class="edu-item">
                <div class="edu-header">
                    <span class="edu-degree">MBA</span>
                    <span class="edu-date">2015</span>
                </div>
                <div class="edu-school">Stanford</div>
            </div>
        </div>
    </div>
</body>
</html>
